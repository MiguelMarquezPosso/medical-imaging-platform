# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Cheap health check on plain HTTP for orchestrators
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main API entry point
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name _;

    # TLS certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.example.com/chain.pem;

    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # Connection limits per IP
    limit_conn conn_zone 50;

    # Hide nginx error pages
    proxy_intercept_errors off;

    # ----- Auth Service routes -----
    # /auth/* → auth-service:/api/v1/auth/*
    location /auth/ {
        # CORS — `always` makes these apply to internally-generated 204 too
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Vary "Origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID, X-Sync-Signature, X-Sync-Device-Id" always;
        add_header Access-Control-Max-Age 86400 always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        limit_req zone=auth_zone burst=20 nodelay;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://auth_upstream/api/v1/auth/;
    }

    # ----- Medical Imaging Service routes -----
    # Synchronization endpoints (Raspberry Pi) — separate rate-limit zone
    location /sync/ {
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Vary "Origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID, X-Sync-Signature, X-Sync-Device-Id" always;
        add_header Access-Control-Max-Age 86400 always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        limit_req zone=sync_zone burst=20 nodelay;
        client_max_body_size 2048m;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://medimg_upstream/api/v1/sync/;
    }

    # DICOMweb / studies / series / instances
    location /api/ {
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Vary "Origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID, X-Sync-Signature, X-Sync-Device-Id" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Access-Control-Expose-Headers "X-Request-ID, Content-Disposition" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        limit_req zone=api_zone burst=60 nodelay;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://medimg_upstream/api/;
    }

    # Gateway-level health
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Block everything else
    location / {
        return 404;
    }

    # Block any internal-only paths if leaked
    location ~ ^/(internal|admin|_debug) {
        deny all;
        return 404;
    }
}
