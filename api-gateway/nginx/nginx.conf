user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upload limits — large DICOM payloads are common
    client_max_body_size 2048m;
    client_body_buffer_size 1m;
    proxy_request_buffering off;

    # Hide upstream identity
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Logging — structured JSON for ingestion
    log_format json_combined escape=json
        '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"request_id":"$request_id",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"upstream":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_time":"$upstream_response_time",'
        '"req_time":$request_time,'
        '"bytes_sent":$bytes_sent,'
        '"ua":"$http_user_agent",'
        '"referer":"$http_referer"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=sync_zone:10m rate=10r/s;
    limit_req_status 429;

    # Connection limits
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/dicom+json;

    # Trust headers from upstream load balancers if any
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Upstream definitions
    upstream auth_upstream {
        server auth-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream medimg_upstream {
        server medical-imaging-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
