version: "3.9"

services:
  auth-service:
    build: .
    image: medimg/auth-service:latest
    container_name: medimg-auth-service
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    container_name: medimg-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-auth}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    image: medimg/auth-service:latest
    container_name: medimg-auth-migrate
    env_file: .env
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

volumes:
  auth-db-data:

networks:
  internal:
    external: true
    name: medimg-internal
